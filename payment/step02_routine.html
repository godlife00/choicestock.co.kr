<body class="v_signalStreng globalStock">
    <div id="wrap">
        <!-- 하단 GNB -->
        <div class="gnb">
            <ul class="list">
                <li class="home"><a href="../index.html">홈</a></li>
                <li class="sch"><a href="../search/search_outline.html">검색</a></li>
                <li class="stock"><a href="../stock/recom.html">추천</a></li>
                <li class="excavation"><a href="../attractiveness/attractiveness.html">발굴</a></li>
                <li class="attention"><a href="../search/_searching.html">관심</a></li>
            </ul>
        </div>
        <!-- //gnb -->

        <div id="header" class="header pay_header">
            <div class="headerTop">
                <a href="javascript:history.back();" class="go_back">히스토리백</a>
                <h1 class="headerLogo"><span>서비스 결제</span></h1>
            </div>
            <!-- //headerTop -->
        </div>

        <!-- 가입 class = sub_payment-->
        <div id="container" class="sub_payment">

            <!-- 정기결제 선택 -->            
            <div class="select_payTop">                
                <div class="step_box">
                    <div class="top">
                        <h3 class="title">초이스스탁US - 월 정기결제 <span class="suggestion">추천</span></h3>                        
                    </div>                    
                    <div class="payRight">
                        <span class="pay01">55,000원</span>
                        <span class="pay02">3,300원
                            <span class="pay_sale">
                                <strong>신규가입 할인가</strong>
                            </span>
                        </span>
                    </div>
                    <!-- //payRight -->                        
                </div>
                <!-- //step_box -->
            </div>
            <!-- //select_payTop -->            

            <!-- 결제 정보 입력 -->
            <div class="payment_guide">
                <p class="pay_guideTxt">*본인 소유의 신용카드(롯데, 삼성, 신한, 현대, NH) 또는 체크카드</p>
                <p class="pay_guideTxt"><a href="" class="card_overseas">*혹시 해외카드로 결제하시나요?</a></p>
                <div class="mapage_form">
                    <div class="subscription-form">
                        <h1 class="form_title">신용카드 카드인증</h1>
                        <form action="" method="" class="form_wrap">
                            <div class="cardNumber">
                                <label for="cardNumber" class="t_label">카드번호</label>
                                <input type="number" id="cardNumber" name="cardNumber" placeholder="1111-1111-1111-1111">
                            </div>                            
                            <div class="security_info">
                                <div>
                                    <label for="select_mon" class="t_label">유효기간</label>
                                    <input type="text" id="select_mon" name="select_mon" placeholder="월/년도">
                                </div>
                                <div>
                                    <label for="cardpw" class="t_label">비밀번호</label>
                                    <input type="password" id="cardpw" name="cardpw" placeholder="앞 2자리 입력">                                
                                </div>                                
                            </div>
                            <div class="auth_no">
                                <label for="auth_no" class="t_label">생년월일</label>
                                <input type="number" id="auth_no" name="auth_no" placeholder="6자리 입력">
                            </div>
                            <div>
                                <label for="terms">
                                    <input type="checkbox" id="terms" name="terms">
                                    약관에 동의합니다
                                </label>
                            </div>
                            
                            <button type="submit">결제하기</button>
                        </form>
                    </div>
                </div>

            </div>

        </div>
        <!-- //container -->

    </div>
    <!-- //wrap -->

</body>

</html>
